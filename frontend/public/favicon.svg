<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bold left-to-right gradient for the droplet outline -->
    <linearGradient id="dropletGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#1E80F3" />
      <stop offset="60%" stopColor="#38BDF8" />
      <stop offset="100%" stopColor="#B3E0FF" />
    </linearGradient>
  </defs>
  
  <!-- Outer Droplet Outline (Thicker stroke for maximum visibility) -->
  <path 
    d="M50 8 C68 35, 82 55, 82 70 A 32 32 0 0 1 18 70 C18 55, 32 35, 50 8 Z" 
    stroke="url(#dropletGrad)" 
    strokeWidth="8" 
    fill="none" 
  />
  
  <!-- Top half of 'S' (White, thick and bold) -->
  <path 
    d="M 59 36 C 59 27, 41 27, 41 38 C 41 44, 49 46, 50 48" 
    stroke="#FFFFFF" 
    strokeWidth="11" 
    strokeLinecap="round" 
    fill="none" 
  />
  
  <!-- Bottom half of 'S' (Vibrant Blue, thick and bold) -->
  <path 
    d="M 50 48 C 51 50, 59 52, 59 58 C 59 69, 41 69, 41 60" 
    stroke="#1E80F3" 
    strokeWidth="11" 
    strokeLinecap="round" 
    fill="none" 
  />
  
  <!-- Base waves -->
  <path 
    d="M 28 73 C 38 70, 42 78, 50 75 C 58 72, 62 80, 72 77" 
    stroke="#38BDF8" 
    strokeWidth="5" 
    strokeLinecap="round" 
    fill="none" 
  />
  <path 
    d="M 24 81 C 34 78, 38 86, 50 83 C 62 80, 66 88, 76 85" 
    stroke="#1E80F3" 
    strokeWidth="5" 
    strokeLinecap="round" 
    fill="none" 
  />
</svg>